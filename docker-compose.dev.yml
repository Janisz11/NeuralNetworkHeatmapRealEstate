version: "3.9"

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - weights:/app/weights
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    environment:
      DATABASE_URL: postgresql://neuralmap:neuralmap@postgres:5432/neuralmap
      SECRET_KEY: dev-secret
      FRONTEND_URL: http://localhost:3000

  postgres:
    ports:
      - "5432:5432"

volumes:
  weights:
