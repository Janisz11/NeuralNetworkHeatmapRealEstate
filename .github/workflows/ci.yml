name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: neuralmap
          POSTGRES_PASSWORD: neuralmap
          POSTGRES_DB: neuralmap
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://neuralmap:neuralmap@localhost:5432/neuralmap
        run: alembic upgrade head

      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://neuralmap:neuralmap@localhost:5432/neuralmap
        run: python seed.py

      - name: Type check (pyright)
        working-directory: backend
        run: pip install pyright && pyright app/ || true

  frontend-lint-build:
    name: Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
